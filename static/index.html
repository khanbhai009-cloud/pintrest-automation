<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinteresto — Bot Control</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--border:#1e1e2e;--accent:#e63946;--accent2:#f4a261;--green:#2dc653;--text:#e8e8f0;--muted:#555570;--card:#13131e}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(230,57,70,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(230,57,70,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:2rem 1.2rem 4rem}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:0.75rem}
.logo-icon{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-size:1.4rem;font-weight:800;letter-spacing:-0.5px}
.logo-text span{color:var(--accent)}
.live-badge{display:flex;align-items:center;gap:0.4rem;background:rgba(45,198,83,0.1);border:1px solid rgba(45,198,83,0.25);color:var(--green);padding:0.3rem 0.8rem;border-radius:20px;font-family:'JetBrains Mono',monospace;font-size:0.72rem;font-weight:600;letter-spacing:0.5px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin-bottom:1.5rem}
@media(min-width:600px){.stats-grid{grid-template-columns:repeat(4,1fr)}}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;position:relative;overflow:hidden;transition:border-color 0.2s}
.stat-card:hover{border-color:var(--accent)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:0;transition:opacity 0.2s}
.stat-card:hover::before{opacity:1}
.stat-label{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:0.5rem}
.stat-value{font-size:2rem;font-weight:800;line-height:1;color:var(--text)}
.stat-value.green{color:var(--green)}.stat-value.accent{color:var(--accent)}.stat-value.orange{color:var(--accent2)}
.control-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem}
.control-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem}
.section-title{font-size:0.85rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted)}
.agent-status{font-family:'JetBrains Mono',monospace;font-size:0.72rem;padding:0.25rem 0.7rem;border-radius:20px;font-weight:600}
.agent-status.idle{background:rgba(85,85,112,0.2);color:var(--muted);border:1px solid var(--border)}
.agent-status.running{background:rgba(244,162,97,0.1);color:var(--accent2);border:1px solid rgba(244,162,97,0.3);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.5}}
.btn-run{width:100%;padding:1rem;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:0.5rem;margin-bottom:1rem}
.btn-run:hover:not(:disabled){background:#c1121f;transform:translateY(-1px);box-shadow:0 8px 24px rgba(230,57,70,0.35)}
.btn-run:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.summary-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:0.8rem 1rem;font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--muted);line-height:1.6;min-height:48px;word-break:break-word}
.summary-box.has-content{color:var(--green)}
.schedule-row{display:flex;gap:0.8rem;margin-bottom:1.5rem}
.schedule-pill{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0.9rem 1rem;text-align:center}
.schedule-time{font-size:1.3rem;font-weight:800;color:var(--accent2);margin-bottom:0.2rem}
.schedule-label{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.products-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.products-header{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1.5rem;border-bottom:1px solid var(--border)}
.btn-refresh{background:transparent;border:1px solid var(--border);color:var(--muted);padding:0.35rem 0.8rem;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:0.7rem;cursor:pointer;transition:all 0.2s}
.btn-refresh:hover{border-color:var(--accent);color:var(--accent)}
.products-list{max-height:380px;overflow-y:auto}
.products-list::-webkit-scrollbar{width:4px}
.products-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.product-row{display:flex;align-items:center;gap:1rem;padding:0.9rem 1.5rem;border-bottom:1px solid var(--border);transition:background 0.15s;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.product-row:hover{background:rgba(255,255,255,0.02)}
.product-row:last-child{border-bottom:none}
.product-img{width:40px;height:40px;border-radius:6px;object-fit:cover;background:var(--border);flex-shrink:0}
.product-info{flex:1;min-width:0}
.product-name{font-size:0.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:0.2rem}
.product-meta{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--muted)}
.status-badge{font-family:'JetBrains Mono',monospace;font-size:0.62rem;font-weight:600;padding:0.2rem 0.6rem;border-radius:20px;flex-shrink:0}
.status-PENDING{background:rgba(244,162,97,0.1);color:var(--accent2);border:1px solid rgba(244,162,97,0.25)}
.status-POSTED{background:rgba(45,198,83,0.1);color:var(--green);border:1px solid rgba(45,198,83,0.25)}
.empty-state{text-align:center;padding:3rem 1rem;font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:var(--muted)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.last-run{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--muted);text-align:center;margin-top:1rem}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">
      <div class="logo-icon">📌</div>
      <div class="logo-text">Pinter<span>esto</span></div>
    </div>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  </header>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value orange" id="stat-pending">—</div></div>
    <div class="stat-card"><div class="stat-label">Posted</div><div class="stat-value green" id="stat-posted">—</div></div>
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" id="stat-total">—</div></div>
    <div class="stat-card"><div class="stat-label">Today</div><div class="stat-value accent" id="stat-today">—</div></div>
  </div>
  <div class="schedule-row">
    <div class="schedule-pill"><div class="schedule-time">9 AM</div><div class="schedule-label">Morning IST</div></div>
    <div class="schedule-pill"><div class="schedule-time">6 PM</div><div class="schedule-label">Evening IST</div></div>
  </div>
  <div class="control-card">
    <div class="control-header">
      <div class="section-title">Agent Control</div>
      <div class="agent-status idle" id="agent-status-badge">IDLE</div>
    </div>
    <button class="btn-run" id="btn-run" onclick="runAgent()">▶ Run Agent Now</button>
    <div class="summary-box" id="summary-box">Waiting for last run summary...</div>
  </div>
  <div class="products-card">
    <div class="products-header">
      <div class="section-title">Products</div>
      <button class="btn-refresh" onclick="loadProducts()">↻ Refresh</button>
    </div>
    <div class="products-list" id="products-list">
      <div class="empty-state">Loading products...</div>
    </div>
  </div>
  <div class="last-run">Last run: <span id="last-run-time">—</span></div>
</div>
<script>
let polling=null;
async function loadStats(){
  try{
    const r=await fetch('/api/stats');
    const d=await r.json();
    document.getElementById('stat-pending').textContent=d.pending??'—';
    document.getElementById('stat-posted').textContent=d.posted??'—';
    document.getElementById('stat-total').textContent=d.total??'—';
    document.getElementById('stat-today').textContent=d.posted_today??'0';
    document.getElementById('last-run-time').textContent=d.last_run||'Never';
    const badge=document.getElementById('agent-status-badge');
    const btn=document.getElementById('btn-run');
    const box=document.getElementById('summary-box');
    if(d.running){
      badge.textContent='RUNNING...';badge.className='agent-status running';
      btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Running...';
    }else{
      badge.textContent='IDLE';badge.className='agent-status idle';
      btn.disabled=false;btn.innerHTML='▶ Run Agent Now';
      stopPolling();
    }
    if(d.last_summary&&d.last_summary!=='Not run yet'){
      box.textContent=d.last_summary;box.className='summary-box has-content';
    }
  }catch(e){console.error(e)}
}
async function loadProducts(){
  try{
    const r=await fetch('/api/products');
    const d=await r.json();
    const list=document.getElementById('products-list');
    if(!d.products||d.products.length===0){
      list.innerHTML='<div class="empty-state">No products yet.<br>Run the agent to fetch some.</div>';
      return;
    }
    list.innerHTML=d.products.map((p,i)=>`
      <div class="product-row" style="animation-delay:${i*0.04}s">
        <img class="product-img" src="${p.image_url||''}" onerror="this.style.background='#1e1e2e';this.src=''" alt="">
        <div class="product-info">
          <div class="product-name">${p.product_name||'Unknown'}</div>
          <div class="product-meta">$${p.sale_price||'—'} &nbsp;·&nbsp; ⭐${p.rating||'—'} &nbsp;·&nbsp; ${p.keyword||''}</div>
        </div>
        <div class="status-badge status-${p.Status||'PENDING'}">${p.Status||'PENDING'}</div>
      </div>`).join('');
  }catch(e){
    document.getElementById('products-list').innerHTML='<div class="empty-state">Failed to load.</div>';
  }
}
async function runAgent(){
  const btn=document.getElementById('btn-run');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Starting...';
  try{
    const r=await fetch('/api/run-agent',{method:'POST'});
    const d=await r.json();
    if(d.status==='busy'){alert('Agent already running!');btn.disabled=false;btn.innerHTML='▶ Run Agent Now';return;}
    startPolling();
  }catch(e){alert('Failed to start agent.');btn.disabled=false;btn.innerHTML='▶ Run Agent Now';}
}
function startPolling(){if(polling)return;polling=setInterval(()=>{loadStats();loadProducts();},3000);}
function stopPolling(){if(polling){clearInterval(polling);polling=null;}}
loadStats();loadProducts();setInterval(loadStats,30000);
</script>
</body>
</html>
