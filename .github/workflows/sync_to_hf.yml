name: Sync to Hugging Face
on:
  push:
    branches: [main] # Ya jo bhi tumhari primary branch ho

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Yaha apni HF repo ka URL dalo
          git push --force https://FinisherTechAI:$HF_TOKEN@huggingface.co/spaces/YOUR_USERNAME/YOUR_SPACE_NAME main
